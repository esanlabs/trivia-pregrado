<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>Trivia VR - ESAN </title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

    <script>
      // ==========================================
      // BASE DE DATOS FINAL - INSTITUCIONAL
      // ==========================================
      const DATABASE = {
        'ES': {
            ui: { 
                bienvenida: "BIENVENIDO", 
                subtitulo: "SEMANA UNIVERSITARIA ESAN",
                instr: "El conocimiento habla, pero la sabiduría escucha",
                credits: "Desarrollado por EsanLabs", 
                btn_es: "COMENZAR", 
                score: "PUNTAJE FINAL", 
                restart: "VOLVER AL MENÚ PRINCIPAL"
            },
            preguntas: [
                { q: "¿En qué año se iniciaron las actividades de la institución?", ops: ["1955", "1963", "1970", "1985"], ans: 1 },
                { q: "¿Qué institución de EE. UU. apoyó en la creación de la escuela?", ops: ["U. Harvard", "U. Yale", "U. Stanford", "U. Princeton"], ans: 2 },
                { q: "El origen de la institución se dio gracias a un convenio entre:", ops: ["Perú y Canadá", "Perú y Estados Unidos", "Perú y España", "Perú y Francia"], ans: 1 },
                { q: "Inicialmente, la institución comenzó como:", ops: ["Una universidad completa", "Un instituto tecnológico", "Una escuela de negocios", "Un centro de investigación"], ans: 2 },
                { q: "Con el paso del tiempo, la institución se transformó en:", ops: ["Inst. educativa integral", "Empresa multinacional", "Centro virtual", "Org. gubernamental"], ans: 0 },
                { q: "Además de negocios, la institución ahora cuenta con:", ops: ["Colegio e instituto", "Pregrado y escuela de gobierno", "Escuela militar", "Hospital universitario"], ans: 1 },
                { q: "¿Cuál es el principal objetivo de los líderes formados aquí?", ops: ["Éxito económico personal", "Ser agentes de cambio", "Expandir negocios", "Innovar en tecnología"], ans: 1 },
                { q: "¿Qué aspecto renovó la institución recientemente?", ops: ["Su campus principal", "Su plan de estudios", "Su identidad gráfica", "Su nombre institucional"], ans: 2 },
                { q: "¿Qué simboliza el nuevo logo de la institución?", ops: ["Expansión internacional", "Evolución y adaptación", "Historia militar", "Enfoque tecnológico"], ans: 1 },
                { q: "¿Qué mensaje transmite la campaña junto con el nuevo logo?", ops: ["Compromiso con la tradición", "Compromiso con la excelencia", "Internacionalización", "Digitalización"], ans: 1 },
                { q: "¿Cuántas décadas lleva la institución formando líderes?", ops: ["5", "6", "7", "8"], ans: 1 },
                { q: "Además de Perú, ¿qué país participó en el convenio inicial?", ops: ["Canadá", "Estados Unidos", "España", "Francia"], ans: 1 },
                { q: "¿Qué tipo de comunidad se menciona en el video?", ops: ["Comunidad de innovación tecnológica", "Comunidad de aprendizaje continuo", "Comunidad de emprendimiento gastronómico", "Comunidad de investigación científica"], ans: 1 },
                { q: "Según el video, ¿qué aspecto refleja la nueva imagen institucional?", ops: ["Tradición histórica", "Evolución constante", "Expansión internacional", "Digitalización"], ans: 1 },
                { q: "Los egresados de ESAN destacan principalmente en:", ops: ["El ámbito deportivo", "El ámbito empresarial", "El ámbito artístico", "El ámbito militar"], ans: 1 },
                { q: "¿Qué frase del video destaca el impacto personal de la institución?", ops: ["Es una experiencia que te cambia la vida", "Es un centro de investigación avanzada", "Es una incubadora de negocios", "Es una red tecnológica internacional"], ans: 0 },
                { q: "¿Qué representa la nueva identidad gráfica de la institución?", ops: ["Tradición", "Evolución", "Internacionalización", "Digitalización"], ans: 1 },
                { q: "¿Qué compromiso destaca la campaña institucional?", ops: ["Compromiso con la tradición", "Compromiso con la excelencia", "Compromiso con la internacionalización", "Compromiso con la digitalización"], ans: 1 },
                { q: "¿Cuántos años de liderazgo celebra actualmente la institución?", ops: ["60", "61", "62", "63"], ans: 1 },
                { q: "Según el video, ¿qué impacto tienen los líderes formados en la institución?", ops: ["Innovan en tecnología", "Impactan positivamente en su comunidad", "Crean grandes empresas", "Influyen en la política internacional"], ans: 1 }
            ]
        }
      };

      let state = { 
          lang: 'ES', 
          qIndex: 0, 
          score: 0, 
          isAnswered: false, 
          musicStarted: false,
          timerInterval: null,
          confettiElements: [],
          snowElements: [],
          activeQuestions: [] 
      };

      AFRAME.registerComponent('game-logic', {
        init: function () {
            this.menuLang = document.querySelector('#menu-idioma');
            this.gameUI = document.querySelector('#ui-juego');
            this.endUI = document.querySelector('#ui-final');
            this.bgMusic = document.querySelector('#bg-music');
            this.soundWin = document.querySelector('#sound-win');
            this.soundFail = document.querySelector('#sound-fail');
            this.videoEl = document.querySelector('#vid-intro');
            this.videoSphere = document.querySelector('#sphere-video');
            this.staticSky = document.querySelector('#sky-static');
            this.blackFader = document.querySelector('#black-fade'); 
            this.timerBar = document.querySelector('#timer-bar');
            this.scene = document.querySelector('a-scene');
            this.updateMenuTexts('ES'); 
            this.gameUI.setAttribute('visible', false); 
            this.gameUI.setAttribute('position', '0 -999 0');
            this.endUI.setAttribute('visible', false); 
            this.endUI.setAttribute('position', '0 -999 0');
            this.menuLang.setAttribute('visible', true);
            this.menuLang.setAttribute('position', '0 1.6 -4'); 
            this.menuLang.setAttribute('scale', '0.1 0.1 0.1'); 
            this.menuLang.setAttribute('animation', 'property: scale; to: 1 1 1; dur: 500; easing: easeOutBack');
        },
        updateMenuTexts: function(lang) {
            const txts = DATABASE[lang].ui;
            document.querySelector('#txt-bienvenida').setAttribute('troika-text', 'value', txts.bienvenida);
            document.querySelector('#txt-subtitulo').setAttribute('troika-text', 'value', txts.subtitulo);
            document.querySelector('#txt-instr').setAttribute('troika-text', 'value', txts.instr);
            document.querySelector('#txt-credits').setAttribute('troika-text', 'value', txts.credits);
            document.querySelector('#txt-btn-es').setAttribute('troika-text', 'value', txts.btn_es);
        },
        startMusic: function() {
            if(!state.musicStarted && this.bgMusic && this.bgMusic.components.sound) { 
                this.bgMusic.components.sound.playSound(); 
                state.musicStarted = true; 
            }
        },
        resetGame: function() { 
            window.location.href = "https://esanlabs.github.io/Trv-pregrado/";
        },
        selectRandomQuestions: function() {
            let allQuestions = [...DATABASE[state.lang].preguntas];
            for (let i = allQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
            }
            // MODIFICADO A 5 PREGUNTAS
            state.activeQuestions = allQuestions.slice(0, 5);
        },
        setLang: function(l) {
            state.lang = l;
            this.selectRandomQuestions(); 
            this.menuLang.setAttribute('visible', false);
            this.menuLang.setAttribute('position', '0 -999 0');
            this.staticSky.setAttribute('visible', false);
            this.videoSphere.setAttribute('visible', true);
            this.videoEl.currentTime = 0; 
            this.videoEl.play();
            this.videoEl.onended = () => { this.startTransitionToGame(); };
        },
        startTransitionToGame: function() {
            this.blackFader.setAttribute('visible', true);
            this.blackFader.setAttribute('animation', { property: 'material.opacity', from: 0, to: 1, dur: 1000, easing: 'linear' });
            setTimeout(() => {
                this.videoSphere.setAttribute('visible', false); 
                this.staticSky.setAttribute('visible', true);    
                const txts = DATABASE[state.lang].ui;
                document.querySelector('#txt-restart').setAttribute('troika-text', 'value', txts.restart);
                this.gameUI.setAttribute('visible', true);
                this.gameUI.setAttribute('position', '0 1.6 -4');
                this.gameUI.setAttribute('scale', '1 1 1');
                this.startMusic();
                this.startSnow();
                this.loadQuestion();
                this.blackFader.setAttribute('animation', { property: 'material.opacity', from: 1, to: 0, dur: 1000, easing: 'linear' });
                setTimeout(() => { this.blackFader.setAttribute('visible', false); }, 1000);
            }, 3000); 
        },
        startSnow: function() {
            for(let i=0; i<200; i++) {
                let flake = document.createElement('a-entity');
                flake.setAttribute('geometry', 'primitive: sphere; radius: 0.03'); 
                flake.setAttribute('material', 'shader: flat; color: #FFFFFF; opacity: 0.9');
                let x = (Math.random() * 16) - 8; let y = (Math.random() * 10) + 5; let z = (Math.random() * 10) - 8; 
                flake.setAttribute('position', `${x} ${y} ${z}`);
                flake.setAttribute('animation', { property: 'position', to: `${x} -2 ${z}`, dur: 3000 + Math.random() * 4000, easing: 'linear', loop: true });
                this.scene.appendChild(flake);
                state.snowElements.push(flake);
            }
        },
        startTimer: function() {
            this.stopTimer(); 
            let timeLeft = 20;
            this.timerBar.setAttribute('width', 6);
            state.timerInterval = setInterval(() => {
                if(state.isAnswered) return;
                timeLeft -= 0.1; 
                let pct = Math.max(0, timeLeft / 20); 
                this.timerBar.setAttribute('width', 6 * pct);
                if(timeLeft <= 0) { this.stopTimer(); this.handleTimeout(); }
            }, 100); 
        },
        stopTimer: function() { if(state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; } },
        handleTimeout: function() {
            state.isAnswered = true;
            if(this.soundFail) this.soundFail.components.sound.playSound(); 
            const q = state.activeQuestions[state.qIndex];
            this.highlightCorrectButton(q.ans);
            setTimeout(() => { state.qIndex++; this.loadQuestion(); }, 1500);
        },
        loadQuestion: function() {
            state.isAnswered = false; this.stopTimer();
            const lista = state.activeQuestions;
            if(state.qIndex >= lista.length) { this.showEndScreen(); return; }
            const q = lista[state.qIndex];
            document.querySelector('#txt-contador').setAttribute('troika-text', 'value', `${state.qIndex + 1} / ${lista.length}`);
            document.querySelector('#txt-pregunta').setAttribute('troika-text', 'value', q.q);
            this.startTimer();
            let answers = q.ops.map((text, index) => { return { text: text, originalIndex: index }; });
            for (let i = answers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [answers[i], answers[j]] = [answers[j], answers[i]];
            }
            for(let i=0; i<4; i++) {
                let btn = document.querySelector(`#btn-op-${i}`); let txt = document.querySelector(`#txt-op-${i}`);
                btn.setAttribute('color', '#B61F25'); 
                if(i < answers.length) {
                    txt.setAttribute('troika-text', 'value', answers[i].text);
                    btn.setAttribute('btn-action', `type: ans; val: ${answers[i].originalIndex}`);
                    btn.classList.add('clickable'); btn.setAttribute('visible', true); txt.setAttribute('visible', true);
                } else { btn.classList.remove('clickable'); btn.setAttribute('visible', false); txt.setAttribute('visible', false); }
            }
        },
        checkAnswer: function(realIndex, clickedButton) {
            if(state.isAnswered) return;
            state.isAnswered = true; this.stopTimer(); 
            const q = state.activeQuestions[state.qIndex];
            if(realIndex === q.ans) {
                state.score++; clickedButton.setAttribute('color', '#4CAF50'); 
                if(this.soundWin) this.soundWin.components.sound.playSound();
            } else {
                clickedButton.setAttribute('color', '#8B0000'); this.highlightCorrectButton(q.ans);
                if(this.soundFail) this.soundFail.components.sound.playSound();
            }
            setTimeout(() => { state.qIndex++; this.loadQuestion(); }, 1500);
        },
        highlightCorrectButton: function(correctIndex) {
            for(let i=0; i<4; i++) {
                let btn = document.querySelector(`#btn-op-${i}`);
                if (btn.getAttribute('visible')) {
                    let actionAttr = btn.getAttribute('btn-action');
                    let val = actionAttr.val !== undefined ? parseInt(actionAttr.val) : -1;
                    if(val === correctIndex) { btn.setAttribute('color', '#4CAF50'); break; }
                }
            }
        },
        launchConfetti: function() {
            const colors = ['#FFC107', '#2196F3', '#FF5722', '#4CAF50', '#E91E63'];
            for (let i = 0; i < 60; i++) {
                let confeti = document.createElement('a-plane');
                let startX = (Math.random() * 8) - 4; let startY = 6 + (Math.random() * 4); let startZ = -4 + (Math.random() * 4);
                confeti.setAttribute('color', colors[Math.floor(Math.random() * colors.length)]);
                confeti.setAttribute('width', '0.08'); confeti.setAttribute('height', '0.08'); confeti.setAttribute('side', 'double');
                confeti.setAttribute('position', `${startX} ${startY} ${startZ}`);
                confeti.setAttribute('animation__fall', { property: 'position', to: `${startX} 0 ${startZ}`, dur: 3000 + Math.random() * 2000, easing: 'linear', loop: true });
                confeti.setAttribute('animation__spin', { property: 'rotation', to: `${Math.random()*360} ${Math.random()*360} ${Math.random()*360}`, dur: 2000, easing: 'linear', loop: true });
                this.scene.appendChild(confeti);
                state.confettiElements.push(confeti);
            }
        },
        showEndScreen: function() {
            this.stopTimer();
            this.transicion(this.gameUI, this.endUI);
            const total = state.activeQuestions.length;
            const imgResultado = document.querySelector('#img-resultado');
            const txtFinal = document.querySelector('#txt-score-final');
            let imageName = "";
            let colorScore = "#FFFFFF";

            if (state.score === total) {
                imageName = "Imagenes/score-10.png"; colorScore = '#FFD700'; this.launchConfetti();
            } else if (state.score >= (total * 0.8)) { 
                imageName = "Imagenes/score-89.png"; colorScore = '#4CAF50'; 
            } else if (state.score >= (total * 0.4)) { 
                imageName = "Imagenes/score-47.png"; colorScore = '#FFEB3B'; 
            } else {
                imageName = "Imagenes/score-03.png"; colorScore = '#D32F2F'; 
            }
            
            imgResultado.setAttribute('src', imageName);
            txtFinal.setAttribute('troika-text', { value: `${state.score} / ${total}`, color: colorScore });
        },
        transicion: function(salida, entrada) {
            salida.setAttribute('visible', false); salida.setAttribute('position', '0 -999 0');
            entrada.setAttribute('visible', true); entrada.setAttribute('position', '0 1.6 -4');
            entrada.setAttribute('scale', '0.1 0.1 0.1');
            entrada.setAttribute('animation', 'property: scale; to: 1 1 1; dur: 500; easing: easeOutBack');
        }
      });

      AFRAME.registerComponent('btn-action', {
        schema: { type: {type:'string'}, val: {type:'string'} },
        init: function() {
            let el = this.el; let data = this.data;
            el.addEventListener('mouseenter', () => {
                if(state.isAnswered && data.type === 'ans') return;
                el.setAttribute('scale', '1.05 1.05 1.05');
                el.setAttribute('material', 'opacity', 0.8);
            });
            el.addEventListener('mouseleave', () => {
                el.setAttribute('scale', '1 1 1');
                el.setAttribute('material', 'opacity', 1.0);
            });
            el.addEventListener('click', () => {
                let logic = document.querySelector('a-scene').components['game-logic'];
                if(data.type === 'lang') logic.setLang(data.val);
                if(data.type === 'ans') logic.checkAnswer(parseInt(data.val), el);
                if(data.type === 'restart') logic.resetGame();
            });
        }
      });
    </script>
  </head>
  <body>
    <a-scene game-logic cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      <a-assets>
        <img id="fondo360" src="Imagenes/fondo360.jpg">
        <img id="logo" src="Imagenes/IW1.png">
        <video id="vid-intro" src="Video/tuvideo360.mp4" playsinline crossorigin="anonymous"></video>
        <audio id="src-music" src="Efectos%20Sonido/musica.mp3" loop="true"></audio>
        <audio id="src-win" src="Efectos%20Sonido/win.mp3"></audio>
        <audio id="src-fail" src="Efectos%20Sonido/fail.mp3"></audio>

        <a-mixin id="btn-red" geometry="primitive: box; depth: 0.05; height: 0.5; width: 2.5" material="color: #B61F25"></a-mixin>
        <a-mixin id="txt-black" troika-text="align: center; color: #000; fontSize: 0.25; maxWidth: 4.8; outlineWidth: 0.0"></a-mixin>
        <a-mixin id="txt-white" troika-text="align: center; color: #FFF; fontSize: 0.12; maxWidth: 4.5; outlineWidth: 0.0"></a-mixin>
      </a-assets>

      <a-entity id="bg-music" sound="src: #src-music; volume: 1.0; loop: true"></a-entity>
      <a-entity id="sound-win" sound="src: #src-win; volume: 3.0"></a-entity>
      <a-entity id="sound-fail" sound="src: #src-fail; volume: 3.0"></a-entity>

      <a-sky id="sky-static" src="#fondo360" radius="60" rotation="0 -90 0"></a-sky>
      <a-videosphere id="sphere-video" src="#vid-intro" radius="60" rotation="0 -90 0" visible="false"></a-videosphere>

      <a-light type="directional" position="-1 2 1" intensity="1"></a-light>
      <a-light type="ambient" intensity="1"></a-light>

      <a-entity id="rig">
        <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false">
            <a-entity id="black-fade" geometry="primitive: sphere; radius: 0.1; segmentsWidth: 8; segmentsHeight: 8" material="color: black; side: double; opacity: 0; transparent: true; shader: flat" visible="false" position="0 0 0"></a-entity>
        </a-camera>
        <a-entity hand-controls="hand: right" laser-controls="hand: right" raycaster="objects: .clickable; far: 10; lineColor: #B61F25"></a-entity>
        <a-entity hand-controls="hand: left"></a-entity>
      </a-entity>

      <a-entity id="menu-idioma">
        <a-entity animation="property: position; from: 0 0 0; to: 0 0.05 0; dir: alternate; dur: 3000; loop: true">
            <a-entity geometry="primitive: plane; width: 5; height: 5.5" material="color: white; shader: flat" position="0 0 -0.1"></a-entity>
            <a-circle src="#logo" position="0 1.8 0.1" radius="0.75" material="shader: flat"></a-circle>
            <a-entity id="txt-bienvenida" mixin="txt-black" position="0 0.6 0.1" troika-text="value: BIENVENIDO; fontSize: 0.5; color: #E3173E"></a-entity>
            <a-entity id="txt-subtitulo" mixin="txt-black" position="0 0 0.1" troika-text="value: SEMANA INTERNACIONAL ESAN; fontSize: 0.28"></a-entity>
            <a-entity id="txt-instr" mixin="txt-black" position="0 -0.5 0.1" troika-text="value: El conocimiento habla, pero la sabiduría escucha; fontSize: 0.18; color: #555"></a-entity>
            <a-entity id="txt-credits" mixin="txt-black" position="0 -0.9 0.1" troika-text="value: Desarrollado por EsanLabs; fontSize: 0.15; color: #888; font-style: italic"></a-entity>
            <a-entity position="0 -1.5 0">
                <a-entity position="0 0 0" animation="property: scale; to: 1.05 1.05 1.05; dir: alternate; dur: 1000; loop: true">
                    <a-box class="clickable" btn-action="type: lang; val: ES" color="#B61F25" width="2.5" height="0.6" depth="0.1"></a-box>
                    <a-entity id="txt-btn-es" mixin="txt-white" position="0 0 0.06" troika-text="value: COMENZAR; fontSize: 0.35"></a-entity>
                </a-entity>
            </a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="ui-juego" visible="false">
        <a-entity position="0 2.2 0">
            <a-entity geometry="primitive: box; width: 2; height: 0.5; depth: 0.05" material="color: #B61F25"></a-entity>
            <a-entity id="txt-contador" mixin="txt-white" position="0 0 0.06" troika-text="value: 1 / 5"></a-entity>
        </a-entity>
        <a-entity geometry="primitive: plane; width: 6; height: 1.5" material="color: white; shader: flat" position="0 1.2 -0.1"></a-entity>
        <a-entity id="txt-pregunta" mixin="txt-black" position="0 1.2 0.06" troika-text="fontSize: 0.2; value: Cargando..."></a-entity>
        <a-entity position="0 0.3 0">
             <a-box width="6" height="0.15" depth="0.05" color="#333"></a-box>
             <a-box id="timer-bar" width="6" height="0.15" depth="0.06" color="#4CAF50" position="0 0 0.01"></a-box>
        </a-entity>
        <a-entity position="0 -0.8 0">
            <a-entity id="btn-op-0" class="clickable" btn-action="type: ans; val: 0" mixin="btn-red" position="-1.4 0.6 0" width="2.6"><a-entity id="txt-op-0" mixin="txt-white" position="0 0 0.06"></a-entity></a-entity>
            <a-entity id="btn-op-1" class="clickable" btn-action="type: ans; val: 1" mixin="btn-red" position="1.4 0.6 0" width="2.6"><a-entity id="txt-op-1" mixin="txt-white" position="0 0 0.06"></a-entity></a-entity>
            <a-entity id="btn-op-2" class="clickable" btn-action="type: ans; val: 2" mixin="btn-red" position="-1.4 -0.2 0" width="2.6"><a-entity id="txt-op-2" mixin="txt-white" position="0 0 0.06"></a-entity></a-entity>
            <a-entity id="btn-op-3" class="clickable" btn-action="type: ans; val: 3" mixin="btn-red" position="1.4 -0.2 0" width="2.6"><a-entity id="txt-op-3" mixin="txt-white" position="0 0 0.06"></a-entity></a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="ui-final" visible="false">
        <a-entity geometry="primitive: plane; width: 5; height: 4" material="color: white; shader: flat" position="0 0.5 -0.1"></a-entity>
        <a-entity id="end-content-wrapper" position="0 0 0">
            <a-image id="img-resultado" position="0 1.2 0.2" width="1.8" height="2.5"></a-image>
            <a-entity id="txt-score-final" mixin="txt-black" position="0 -0.3 0.2" troika-text="color: #4CAF50; fontSize: 0.4; value: 0 / 5"></a-entity>
            <a-entity position="0 -1.0 0.2">
                <a-box class="clickable" btn-action="type: restart; val: 0" color="#B61F25" width="2.5" height="0.6" depth="0.05"></a-box>
                <a-entity id="txt-restart" mixin="txt-white" position="0 0 0.06" troika-text="value: VOLVER AL MENÚ PRINCIPAL; fontSize: 0.18"></a-entity>
            </a-entity>
        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
